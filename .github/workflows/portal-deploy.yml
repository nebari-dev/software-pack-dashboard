name: Portal deploy
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
concurrency: { group: portal-deploy, cancel-in-progress: true }
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: pip install -r requirements.txt
      - uses: actions/setup-go@v5
        with: { go-version-file: site/go.mod, cache: false }
      - uses: peaceiris/actions-hugo@v3
        with: { hugo-version: "0.159.0", extended: true }

      - name: Render landing content
        run: python generate.py --landing site/content/_index.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build landing (Hugo)
        run: cd site && hugo --gc --minify --baseURL "https://packs.nebari.dev/"

      - name: Generate Worker routes
        run: python generate_routes.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy dashboard (landing) to Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy site/public --project-name=software-pack-dashboard --branch=main

      - name: Deploy routing Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: worker
          command: deploy
